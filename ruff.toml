line-length = 100

[lint]
# Rule documentation: https://docs.astral.sh/ruff/rules/
select = [
    "E",      # pycodestyle (error)
    "F",      # pyflakes
    "B",      # bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "I",      # isort
    "UP",     # pyupgrade
    "PIE",    # flake8-pie
    "PGH",    # pygrep-hooks
    "PYI",    # flake8-pyi
    "RUF",    # Ruff-specific
    "PT",     # flake8-pytest-style
]
