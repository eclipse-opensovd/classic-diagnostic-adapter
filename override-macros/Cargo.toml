[package]
name = "override-macros"
version = "0.1.0"
edition.workspace = true
publish = false
homepage.workspace = true
license.workspace = true

[lints]
workspace = true

[lib]
proc-macro = true
path = "src/lib.rs"

[dependencies]
proc-macro2 = { workspace = true }
quote = { workspace = true }
syn = { workspace = true }

[dev-dependencies]
# The generated code references `::linkme` and `::tracing`; the macros
# themselves do not use them, but this crate's own tests do.
linkme = { workspace = true }
tracing = { workspace = true }
