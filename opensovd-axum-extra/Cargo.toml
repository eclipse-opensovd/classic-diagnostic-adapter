[package]
name = "opensovd-axum-extra"
version = "0.1.0"
edition.workspace = true
publish = false
homepage.workspace = true
license.workspace = true

[lints]
workspace = true

[lib]
path = "src/lib.rs"

[features]
# Controls which host sources are considered during extraction
# `default` enables all of host sources to preserve the previous axum-extra Host behavior
# "forwarded", "x-forwarded-host", "host-header" and "uri-authority" enable parsing of each respective source header independently
default = ["forwarded", "x-forwarded-host", "host-header", "uri-authority"]
forwarded = []
x-forwarded-host = []
host-header = []
uri-authority = []

[dependencies]
aide = { workspace = true }
axum = { workspace = true }
http = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
