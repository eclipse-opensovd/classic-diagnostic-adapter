[package]
name = "integration-tests"
version = "0.1.0"
edition.workspace = true
publish = false
description = "Integration tests for the whole Classic Diagnostic Adapter (CDA) system"
homepage.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
# internal dependencies
cda-interfaces = { workspace = true }
cda-core = { workspace = true }
cda-database = { workspace = true }
cda-sovd = { workspace = true }
sovd-interfaces = { workspace = true }
cda-tracing = { workspace = true }
cda-plugin-security = { workspace = true }
cda-comm-doip = { workspace = true }
cda-comm-uds = { workspace = true }
cda-health = { workspace = true }
opensovd_cda_lib = { workspace = true, features = ["integration-tests"] }

# External dependencies
# tokio
tokio = { workspace = true, features = ["rt", "sync", "io-util", "time"] }
# serde
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_qs = { workspace = true, features = ["axum"] }
# http
aide = { workspace = true, features = ["axum"] }
axum = { workspace = true }
reqwest = { workspace = true, features = ["multipart"] }
http = { workspace = true }
mime = { workspace = true }
schemars = { workspace = true }
url = { workspace = true }
urlencoding = { workspace = true }
# logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = [
  "ansi",
  "chrono",
  "env-filter",
  "fmt",
  "json",
  "parking_lot",
  "std",
] }
# error
thiserror = { workspace = true }
# toml serialization
toml = { workspace = true }
# config merging
figment = { workspace = true, features = ["toml"] }
# time
chrono = { workspace = true }
# future
futures = { workspace = true }
# libc
libc = { workspace = true }

# compile time format
const_format = { workspace = true }

[build-dependencies]
cda-build = { workspace = true }

[features]
# We need the health endpoint to check if CDA is online
default = ["opensovd_cda_lib/health"]
integration-tests = []
# Variant of the integration tests that exercises the CAN transport
# (`CDA_INTEGRATION_TEST_USE_CAN=true`). Compiles in `can-socketcand` so the
# CDA-side socketcand backend is actually wired in; the ECU simulator reaches
# the same vcan bus through a socketcand daemon.
can-integration-tests = ["integration-tests", "opensovd_cda_lib/can-socketcand"]

# Integration tests are only compiled when the feature is enabled.
[[test]]
name = "integration_tests"
path = "tests/integration_tests.rs"
required-features = ["integration-tests"]
