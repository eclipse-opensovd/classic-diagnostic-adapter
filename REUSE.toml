version = 1

# declares copyright and license metadata for files that can't easily contain license headers themselves.
[[annotations]]
path = [
  "LICENSE",
  "NOTICE",
  "CONTRIBUTORS",
  "LICENSES/**.txt",
  "**/.env.example",
  "**/.gitkeep",
  "**/.markdownlintignore",
  "**/*.fbs",
]
SPDX-License-Identifier = "Apache-2.0"
