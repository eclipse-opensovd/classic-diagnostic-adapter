# Post PR comments from artifacts produced by the "Rust CI" workflow.
# This workflow_run trigger runs in the context of the base repository, so
# it has write permissions even when the PR originates from a fork.

name: Post PR Comments

on:
  workflow_run:
    workflows: ["Rust CI"]
    types: [completed]

jobs:
  post:
    if: github.event.workflow_run.event == 'pull_request'
    uses: eclipse-opensovd/cicd-workflows/.github/workflows/post-pr-comments.yml@ce8704cb92a29e070eb30f423387f85a131553fe
    with:
      run-id: ${{ github.event.workflow_run.id }}
      comment-artifacts: pr-comment-coverage pr-comment-crap pr-comment-nightly-clippy
    permissions:
      actions: read
      pull-requests: write
