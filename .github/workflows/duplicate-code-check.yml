name: Duplicate Code Check

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  duplication:
    name: Detect duplicate code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run jscpd
        continue-on-error: true
        run: |
          npx --yes jscpd@4 . \
            --config .jscpd.json \
            --reporters json \
            --output ../jscpd-report \
            --silent || true

      - name: Get changed files
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(
              github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
              }
            );
            const fs = require('fs');
            fs.writeFileSync(
              'changed-files.txt',
              files.map(f => f.filename).join('\n')
            );

      - name: Analyze duplication
        run: |
          python3 .github/scripts/analyze-duplication.py \
            ../jscpd-report/jscpd-report.json \
            changed-files.txt

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/body.md', 'utf8');
            const marker = '<!-- duplicate-code-check -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Create check run
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = fs.readFileSync('/tmp/check-title.txt', 'utf8').trim();
            const summary = fs.readFileSync('/tmp/check-summary.txt', 'utf8').trim();

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Duplicate Code Check',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: 'success',
              output: { title, summary },
            });
