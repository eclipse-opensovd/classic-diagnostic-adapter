name: Rust CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  # pull-requests: write is required by the coverage job to post PR comments.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  features:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "--cfg tokio_unstable -L /usr/local/lib"
      PKG_CONFIG_PATH: "/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly-2025-07-14
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "34.1"
          # The action queries the GitHub API to fetch releases data,
          # to avoid rate limiting, passing the default token.
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup DLT tracing lib
        uses: eclipse-opensovd/dlt-tracing-lib/.github/actions/setup-dlt@main
      - name: Build all features
        run: cargo build --locked --verbose --all-features
      - name: Verify generated files are up to date
        run: |
          if ! git diff --exit-code cda-database/src/flatbuf/diagnostic_description.rs cda-database/src/proto/fileformat.rs; then
            echo ""
            echo "::error::Generated files are out of date."
            echo "Regenerate flatbuffers with: cargo build -p cda-database --features gen-flatbuffers"
            echo "Regenerate protos with: cargo build -p cda-database --features gen-protos"
            exit 1
          fi
          echo "Generated files are up to date."
      - name: Verify reference config matches generated config
        run: |
          cargo run --locked --all-features -- generate-config --output /tmp/opensovd-cda.toml
          if ! diff -u opensovd-cda.toml /tmp/opensovd-cda.toml; then
            echo ""
            echo "::error::opensovd-cda.toml does not match configuration generated from code."

            cat <<EOF
          The opensovd-cda.toml file is a reference generated from the source code.
          You should not edit it directly and it needs to be regenerated when you
          edit the configuration fields in the source code.

          You can regenerate it with:
          cargo run --all-features -- generate-config --output opensovd-cda.toml

          You will need DLT installed as a library on your system.
          You can install it like so:
            * On Debian-based systems: apt install libdlt-dev
            * On macOS with Homebrew:
              brew tap COVESA/dlt-daemon https://github.com/COVESA/dlt-daemon
              brew install COVESA/dlt-daemon/dlt-daemon
          EOF
            exit 1
          fi
          echo "opensovd-cda.toml is up to date."
      # note: if openssl and mbedtls are enabled falls back to openssl
      # therefore we build mbedtls separately as well
      - name: Build mbedtls features
        run: cargo build --locked --verbose -p opensovd-cda --no-default-features --features mbedtls
      - name: Build minimal features
        run: cargo build --locked --verbose --no-default-features
      - name: Build minimal CDA only
        # Building CDA only makes sure that optional dependencies
        # from within the workspace are properly marked as optional and guarded
        # with cfg flags.
        run: cargo build --locked --verbose --no-default-features --package opensovd-cda

  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88.0
          components: clippy, rustfmt, llvm-tools-preview
      - name: Install cargo-deny
        run: cargo install --locked --version 0.18.9 cargo-deny
      - name: Install cargo-llvm-cov
        run: cargo install --locked cargo-llvm-cov
      - name: Build
        run: cargo build --locked --verbose
      - name: Check licenses
        run: cargo deny check licenses
      - name: Check allowed sources
        run: cargo deny check sources
      - name: Check banned practises
        run: cargo deny check bans
      # In order to utilize caching, the docker images need to be built in the github action.
      - name: Build CDA docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: testcontainer/cda/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository }}/opensovd-cda:latest
          load: true
          cache-from: |
            type=gha,scope=cda-cargo-${{ github.ref_name }}
            type=gha,scope=cda-cargo-main
            type=gha,scope=cda-sccache-${{ github.ref_name }}
            type=gha,scope=cda-sccache-main
          cache-to: |
            type=gha,mode=max,scope=cda-cargo-${{ github.ref_name }}
            type=gha,mode=max,scope=cda-sccache-${{ github.ref_name }}
      - name: Build CDA docker image (coverage-enabled)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: testcontainer/cda/Dockerfile.coverage
          push: false
          tags: ghcr.io/${{ github.repository }}/opensovd-cda:coverage
          load: true
          cache-from: |
            type=gha,scope=cda-cargo-${{ github.ref_name }}
            type=gha,scope=cda-cargo-main
            type=gha,scope=cda-sccache-${{ github.ref_name }}
            type=gha,scope=cda-sccache-main
          cache-to: |
            type=gha,mode=max,scope=cda-cargo-${{ github.ref_name }}
            type=gha,mode=max,scope=cda-sccache-${{ github.ref_name }}
      - name: Build ECU Sim docker image
        uses: docker/build-push-action@v5
        with:
          context: testcontainer/ecu-sim/
          file: testcontainer/ecu-sim/docker/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository }}/ecu-sim:latest
          load: true
          cache-from: |
            type=gha,scope=ecu-sim-gradle-${{ github.ref_name }}
            type=gha,scope=ecu-sim-gradle-main
          cache-to: |
            type=gha,mode=max,scope=ecu-sim-gradle-${{ github.ref_name }}
      - name: Run unit tests with coverage
        run: cargo llvm-cov --locked --workspace --lcov --output-path lcov.info -- --show-output
      - name: Run integration tests with Docker coverage
        env:
          CACHE_REGISTRY: ghcr.io/${{ github.repository }}
          CDA_INTEGRATION_TEST_COVERAGE: "true"
        run: cargo test --locked -p integration-tests --features integration-tests -- --show-output
      - name: Collect and merge coverage data
        run: |
          set -x

          LLVM_PROFDATA=$(rustc --print sysroot)/lib/rustlib/x86_64-unknown-linux-gnu/bin/llvm-profdata
          LLVM_COV=$(rustc --print sysroot)/lib/rustlib/x86_64-unknown-linux-gnu/bin/llvm-cov

          sudo apt-get update && sudo apt-get install -y lcov

          if [ -f "target/coverage/opensovd-cda" ] && ls target/coverage/*.profraw 1>/dev/null 2>&1; then
            echo "Processing Docker coverage data..."
            $LLVM_PROFDATA merge -sparse target/coverage/*.profraw -o target/coverage/docker.profdata

            # Export Docker coverage, filtering to workspace sources (/app/) only
            $LLVM_COV export -format=lcov \
              target/coverage/opensovd-cda \
              -instr-profile=target/coverage/docker.profdata \
              --ignore-filename-regex='/usr/local/cargo|/usr/local/rustup' \
              > lcov-docker-raw.info

            # Rewrite /app/ paths to match the runner workspace paths so lcov --add
            # recognises them as the same files and unions hit counts instead of stacking
            WORKSPACE=$(cargo metadata --no-deps --format-version 1 | jq -r '.workspace_root')
            sed "s|SF:/app/|SF:${WORKSPACE}/|g" lcov-docker-raw.info > lcov-docker.info

            echo "Merging unit test and Docker integration coverage..."
            lcov --add-tracefile lcov.info --add-tracefile lcov-docker.info \
              --output-file lcov-merged.info --ignore-errors inconsistent
          else
            echo "No Docker coverage data found, using unit test coverage only"
            cp lcov.info lcov-merged.info
          fi

          SUMMARY=$(lcov --summary lcov-merged.info 2>&1 || true)
          echo "$SUMMARY"
          TOTAL_COV=$(echo "$SUMMARY" | grep -oP 'lines\.*:\s*\K[0-9.]+' || echo "0")
          echo "**Total line coverage: ${TOTAL_COV}%**" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov-merged.info
          retention-days: 30
      - name: Generate coverage PR comment artifact
        if: github.event_name == 'pull_request'
        run: |
          TOTAL_COV=$(lcov --summary lcov-merged.info 2>&1 | grep -oP 'lines\.*:\s*\K[0-9.]+' || echo "0")
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SYMBOL="$(printf '\xf0\x9f\x93\x8a')"
          mkdir -p pr-comment-coverage
          echo "${{ github.event.number }}" > pr-comment-coverage/pr_number
          printf '%s\n' \
            '<!-- coverage-report -->' \
            "### ${SYMBOL} Coverage Report (unit + integration)" \
            '' \
            "**Total line coverage: ${TOTAL_COV}%**" \
            '' \
            "[Full build artifacts](${RUN_URL})" \
            > pr-comment-coverage/body.md
      - name: Upload coverage PR comment artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: pr-comment-coverage
          path: pr-comment-coverage/

  cargo-crap:
    name: CRAP (Change Risk Anti-Patterns)
    if: github.event_name == 'pull_request'
    needs: [build_and_test]
    uses: eclipse-opensovd/cicd-workflows/.github/workflows/crap.yml@07140bdd84f20b66fd4aff58a83c5148deec388c
    with:
      rust-version: "1.88.0"
      cargo-crap-git-url: "https://github.com/theswiftfox/cargo-crap.git"
      cargo-crap-git-rev: "27bab7d86c0ff9c4f8f681d6538be24572ca1a8d"
      post-pr-comment: true
      fail-regressions: false
    permissions:
      contents: read
      pull-requests: write

  build_windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88.0
          components: clippy, rustfmt
      - name: Setup OpenSSL (Windows) Environment
        run: |
          echo "OPENSSL_DIR=$env:OPENSSL_DIR" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$env:OPENSSL_DIR\lib\VC\$env:RUNNER_ARCH\MD" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$env:OPENSSL_DIR\include" >> $env:GITHUB_ENV
        env:
          OPENSSL_DIR: C:\Program Files\OpenSSL
      - name: Build
        run: cargo build --locked --verbose
      - name: Test
        run: cargo test --locked -- --show-output
