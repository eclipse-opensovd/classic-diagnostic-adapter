name: Nightly Advisories, Clippy and Format Checks

on:
  schedule:
    - cron: "0 4 * * *" # Daily at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  advisories:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88.0
      - name: Install cargo-deny
        run: cargo install --locked --version 0.18.9 cargo-deny
      - name: Check advisories
        run: cargo deny check advisories
  nightly_clippy:
    runs-on: ubuntu-latest
    name: "Nightly Lint and Format"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false
      - name: Setup DLT tracing lib
        uses: eclipse-opensovd/dlt-tracing-lib/.github/actions/setup-dlt@main
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "34.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
<<<<<<< HEAD
      - name: Format and Clippy
        uses: eclipse-opensovd/cicd-workflows/rust-lint-and-format-action@bc4742225426b519497faff8df1cec52f6d6b364
        with:
          toolchain: nightly-2025-07-14
