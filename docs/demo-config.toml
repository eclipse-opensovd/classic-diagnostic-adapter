# Demo configuration showing communication parameters, per-ECU overrides,
# and address fallback references.
#
# Only the relevant sections are shown.  Values not listed here use their
# built-in defaults (see ComParams / DoipComParams / UdsComParams impls).
[communication]
doip_protocol_name = "UDS_Ethernet_DoIP"
doip_dobt_protocol_name = "UDS_Ethernet_DoIP_DOBT"


# Global communication parameters – apply to all ECUs unless overridden
# Each field has:
#   name     – comparam name used for the database lookup
#   default  – value used when the comparam is not found in the database
#   fallback – (optional) name of another field (of the same type) whose
#              *resolved* value is used instead of `default` when the database
#              lookup fails.  Works for all communication parameters, not just
#              addresses.  The referenced field must appear earlier in the
#              resolution order within the same type group.

[com_params.doip]
# When true, com param lookups that fail under the configured protocol are
# retried without a protocol filter.  Useful for databases where some com
# params (e.g. CP_UniqueRespIdTable) have no protocol reference.
comparam_ignore_protocol_in_lookup = true

[com_params.doip.logical_gateway_address]
name = "CP_DoIPLogicalGatewayAddress"
default = 0

[com_params.doip.logical_ecu_address]
name = "CP_DoIPLogicalEcuAddress"
default = 0

[com_params.doip.logical_functional_address]
name = "CP_DoIPLogicalFunctionalAddress"
default = 0
# If not found in the database, fall back to the resolved gateway address:
fallback = "logical_gateway_address"

[com_params.doip.logical_tester_address]
name = "CP_DoIPLogicalTesterAddress"
default = 0

[com_params.doip.routing_activation_timeout]
name = "CP_DoIPRoutingActivationTimeout"
default = { secs = 30, nanos = 0 }

[com_params.doip.connection_timeout]
name = "CP_DoIPConnectionTimeout"
default = { secs = 30, nanos = 0 }

[com_params.doip.connection_retry_delay]
name = "CP_DoIPConnectionRetryDelay"
default = { secs = 5, nanos = 0 }

[com_params.doip.connection_retry_attempts]
name = "CP_DoIPConnectionRetryAttempts"
default = 100

# If timeout_default is not found in the database, use the resolved value
# of rc_78_timeout instead.
[com_params.uds.timeout_default]
name = "CP_P6Max"
default = { secs = 1, nanos = 0 }
fallback = "rc_78_timeout"

[com_params.uds.tester_present_time]
name = "CP_TesterPresentTime"
default = { secs = 2, nanos = 0 }


# Per-ECU configuration – values here override the global defaults above

# ECU "MyEcu": override the tester address with a literal value
# and increase the default timeout.
[ecu.MyEcu.com_params.doip]
logical_tester_address = 42

[ecu.MyEcu.com_params.uds]
timeout_default = { secs = 5, nanos = 0 }


# ECU "SlowEcu": longer timeouts
[ecu.SlowEcu.com_params.uds]
timeout_default = { secs = 10, nanos = 0 }
rc_78_completion_timeout = { secs = 60, nanos = 0 }
tester_present_time = { secs = 4, nanos = 0 }

[ecu.SlowEcu.com_params.doip]
connection_timeout = { secs = 60, nanos = 0 }
connection_retry_attempts = 200


# ECU "GatewayEcu": if functional address is not in the database,
# reuse the gateway address.  This uses the structured override form.
[ecu.GatewayEcu.com_params.doip.logical_functional_address]
fallback = "logical_gateway_address"

# ECU "SpecialEcu": set both a new default and a fallback reference
[ecu.SpecialEcu.com_params.doip.logical_ecu_address]
default = 100
fallback = "logical_gateway_address"
