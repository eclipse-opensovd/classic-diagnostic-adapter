# Docker Compose override for coverage-instrumented builds.
# Usage: docker compose -f docker-compose.yml -f docker-compose.coverage.yml up
#
# This override:
#   - Uses the coverage-enabled Dockerfile that builds with -C instrument-coverage
#   - Mounts a volume to collect .profraw files generated during test execution
#   - Sets LLVM_PROFILE_FILE to control where coverage data is written
#
# In CI, set CACHE_REGISTRY to use the pre-built coverage image instead of rebuilding.

services:
  cda:
    image: ${CACHE_REGISTRY:-local}/opensovd-cda:coverage
    build:
      context: ..
      dockerfile: testcontainer/cda/Dockerfile.coverage
    volumes:
      - coverage-data:/app/coverage
    environment:
      - RUST_LOG=debug
      - CDA_CONFIG_FILE=/app/cda-test-config.toml
      - LLVM_PROFILE_FILE=/app/coverage/cda-%p-%m.profraw
    stop_signal: SIGTERM
    stop_grace_period: 10s

volumes:
  coverage-data:
    name: cda-coverage-data
