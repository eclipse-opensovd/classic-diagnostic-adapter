[package]
name = "cda-storage"
version = "0.1.0"
edition.workspace = true
publish = false
description = "Storage access implementation for CDA"
homepage.workspace = true
license.workspace = true

[lints]
workspace = true

[features]
## Enable runtime validation of collection names and keys used as path segments.
## Rejects directory traversal attempts (e.g., "..", "/") with an error.
sanitize-paths = []
nightly = []

[lib]
path = "src/lib.rs"

[dependencies]
# internal dependencies
cda-interfaces = { workspace = true }

# external
async-trait = { workspace = true }
rkyv = { workspace = true }
crc32fast = { workspace = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

# tokio
tokio = { workspace = true, features = ["fs", "io-util", "sync", "rt"] }

[dev-dependencies]
tokio = { workspace = true, features = [
  "macros",
  "rt-multi-thread",
  "io-util",
] }
tempfile = { workspace = true }
