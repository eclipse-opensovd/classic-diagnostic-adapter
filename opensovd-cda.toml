# DTC (Diagnostic Trouble Code) fault memory settings.
[faults]
# Default scope name for standard fault memory operations.
# default_scope = "FaultMem"
# Service definition used to clear all user-defined DTCs.
# Specified as a byte array representing the full UDS service identifier.
#
# Example: `[0x31, 0x01, 0x02, 0x46]`
# The first byte is the service ID, followed by any coded constant parameters
# (subfunction, routine ID, etc.) as they appear sequentially in the UDS request.
#
# If not set, clearing user-defined DTCs is not supported.
# user_defined_dtc_clear_service = [
#     0x31,
#     0x01,
#     0x02,
#     0x46,
# ]
# Name of the scope to pass to the DTC functions to read from the user defined DTC memory.
# Matching will be case-insensitive.
# user_memory_scope = "DevelopmentFaultMemory"

# `FlatBuffers` verification settings for MDD database parsing.
[flat_buf]
# Skip null terminator validation in `FlatBuffers` strings.
# ignore_missing_null_terminator = false
# Maximum apparent buffer size in bytes for `FlatBuffers` verification.
# max_apparent_size = 9223372036854775807
# Maximum nesting depth allowed during `FlatBuffers` verification.
# max_depth = 64
# Maximum number of tables allowed during `FlatBuffers` verification.
# max_tables = 100000000
# Enable decompression of MDD database files.
# mdd_decompress = false
# Enable `FlatBuffers` verification on loaded MDD data.
# verify = false

# Functional group description and lookup settings.
[functional_description]
# Name of the database containing functional group definitions.
# description_database = "functional_groups"
# Optional set of functional group names to enable.
# When absent, all functional groups are enabled.
# enabled_functional_groups = ["example_group"]
# Position of the protocol identifier in service names.
# protocol_position = "Suffix"

# Health check endpoint settings.
[health]
# Whether the health check endpoint is active.
# enabled = true

# Logging, file output, and tracing backend settings.
[logging]
# strftime-compatible format string for log timestamps.
# timestamp_format = "%T%.3f"

# AUTOSAR DLT (Diagnostic Log and Trace) output configuration.
[logging.dlt_tracing]
# DLT application description string, max 256 characters.
# app_description = "OpenSOVD CDA"
# DLT application ID, max 4 characters
# app_id = "CDA"
# Whether DLT tracing output is enabled.
# enabled = true

# File-based logging configuration.
[logging.log_file_config]
# Whether to append to existing log files instead of rotating.
# append_enabled = false
# strftime-compatible date format used in log file entries.
# date_format = "%F %T%.3f"
# Whether file logging is enabled.
# enabled = false
# Log file name.
# name = "opensovd-cda.log"
# Directory path for log files.
# path = "/var/log/opensovd-cda"

# OpenTelemetry tracing and metrics export configuration.
[logging.otel]
# Whether OpenTelemetry tracing and metrics export is enabled.
# enabled = false
# OTLP collector endpoint URL (e.g. `http://localhost:4317`).
# endpoint = "http://localhost:4317"

# tokio-console runtime tracing configuration.
[logging.tokio_tracing]
# Optional file path to record trace data to disk.
# recording_path = "/tmp/tokio-recording"
# Socket address for the tokio-console gRPC server (e.g. "127.0.0.1:6669").
# server = "127.0.0.1:6669"

# How long to retain runtime tracing data.
[logging.tokio_tracing.retention]
# nanos = 0
# secs = 3600

# Configuration for update plugin, i.e. storage paths
[runtime_update_config]
# When `true` and the `Configuration` storage collection is empty,
# seed it from the configuration file loaded from disk on first startup.
# Default: `false`.
# init_storage_from_config_file = false
# When `true` and the `DiagnosticDatabase` storage collection is empty,
# seed it from `database.path` on first startup by copying all `.mdd` files.
# Default: `false`.
# init_storage_from_database_path = false
# Value of the Retry-After header (in seconds) sent when the service is
# temporarily unavailable due to a busy transaction.
# Default: 1 second.
# retry_after_seconds = 1
# Directory where the updatable configuration and database are stored.
# storage_dir = "."
# Maximum upload body size in bytes for multipart file uploads.
# Default: 50MB. Axum's built-in limit is 2MB which is too low for MDD files.
# upload_body_limit_bytes = 52428800

# SOVD HTTP server bind settings.
[server]
# IP address the server listens on.
# address = "0.0.0.0"
# TCP port the server listens on.
# port = 20002

# Strict-mode validation flags.
[strict]
# Exit with an error if any key under `[ecu.<name>]` does not match a
# loaded MDD database.
# ecu_config = false
# Master switch - when `true`, all individual strict checks are enabled.
# enabled = false
# Reject requests containing parameters not defined in the diagnostic
# service with a `BadPayload` error (HTTP 400).
# parameter_validation = false
