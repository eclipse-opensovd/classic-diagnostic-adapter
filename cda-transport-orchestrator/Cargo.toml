[package]
name = "cda-transport-orchestrator"
version = "0.1.0"
edition.workspace = true
publish = false
description = "Transport orchestration layer for the Classic Diagnostic Adapter"
homepage.workspace = true
license.workspace = true

[lints]
workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
# internal
cda-interfaces = { workspace = true }
# external
tokio = { workspace = true, features = ["sync"] }
tracing = { workspace = true }

[features]
default = []
dlt-tracing = ["cda-interfaces/dlt-tracing"]
