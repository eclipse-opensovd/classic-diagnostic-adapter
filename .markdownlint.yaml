default: true
# Line length - raise limit to avoid wrapping long URLs or code snippets
MD013:
  line_length: 1000
# Multiple headings with the same content - only flag duplicates outside sibling sections
MD024:
  siblings_only: true
# Inline HTML - allow raw HTML in Markdown
MD033: false
# Fenced code blocks should have a language - allow code blocks without a language tag
MD060: false
