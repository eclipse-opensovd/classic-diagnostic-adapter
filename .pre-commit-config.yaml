exclude: ^cda-database/src/(flatbuf/diagnostic_description|proto/fileformat)\.rs$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: '\.(patch|diff)$'
      - id: mixed-line-ending
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-docker
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        exclude: ^testcontainer/ecu-sim/gradlew$
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
  - repo: https://github.com/eclipse-opensovd/cicd-workflows
    rev: e5e7addf1d63b31646b52c30cacacd5934b623e1
    hooks:
      - id: reuse-annotate
      - id: no-unicode-check
        args:
          - --allowed-chars=µ,§
      - id: no-banner-comment-check
        exclude: ^comm-mbedtls/
      - id: validate-cargo-lints
      - id: cargo-fmt
      - id: clippy
        name: Clippy
        entry: shared-config/cargo-clippy.sh
        language: script
        pass_filenames: false
        args: ["--all-targets", "--", "-D", "warnings"]
      - id: check-hooks
