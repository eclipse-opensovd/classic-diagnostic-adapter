threshold = 30.0
missing = "pessimistic" # pessimistic | optimistic | skip
exclude = [
  "**/build.rs",
  "tests/**",
  "benches/**",
  "src/flatbuf/**",
  "src/proto/**",
]
allow = ["generated::*", "src/generated/**", "get_nrc_code"]
epsilon = 0.01 # regression-detector tolerance
jobs = 4 # cap parallel analysis at 4 threads
